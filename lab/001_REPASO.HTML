<!-- 001_REPASO.HTML -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juego de la Serpiente - Taller</title>
   <link rel="stylesheet" href="001_REPASO.CSS">
</head>
<body>
  <main class="contenedor-juego">
    <h1>🐍 Juego de la Serpiente</h1>
    <p class="descripcion">
      ¡Guía a la serpiente 🐍, come la comida 🍎 para crecer y evita chocar! 
      <br> Usa las flechas o los botones para moverte.
    </p>

    <section class="panel-info">
      <div class="tarjeta-info">
        <span>Puntaje</span>
        <strong id="puntaje">0</strong>
      </div>
      <div class="tarjeta-info">
        <span>Tiempo</span>
        <strong id="tiempo">00:00</strong> 
      </div>
      <div class="tarjeta-info">
        <span>Estado</span>
        <strong id="estado">Listo</strong>
      </div>
    </section>

    <section class="controles-dificultad">
      <button onclick="configurarDificultad(300)">Fácil</button>
      <button onclick="configurarDificultad(150)">Medio</button>
      <button onclick="configurarDificultad(50)">Difícil</button>
    </section>

    <p id="mensaje" class="mensaje">Elige dificultad o presiona INICIAR</p>

    <canvas id="canvasJuego" width="500" height="500"></canvas>

    <section class="controles">
      <button class="vacio">-</button>
      <button onclick="cambiarDireccion('arriba')">⬆️</button>
      <button class="vacio">-</button>

      <button onclick="cambiarDireccion('izquierda')">⬅️</button>
      <button onclick="pausarJuego()">⏸️</button>
      <button onclick="cambiarDireccion('derecha')">➡️</button>

      <button class="vacio">-</button>
      <button onclick="cambiarDireccion('abajo')">⬇️</button>
      <button class="vacio">-</button>
    </section>

    <section class="acciones">
      <button onclick="iniciarJuego()">INICIAR</button>
      <button class="secundario" onclick="reiniciarJuego()">REINICIAR</button>
    </section>

  </main>

  <script src="001_REPASO.JS"></script>
</body>
</html>
